pool:
  # Three-tier polla scoring, varying by stage. Per match a prediction earns
  # one tier: exact score / right goal difference (or any draw if a draw was
  # predicted) / right winner only.
  scoring:
    group:   {exact: 5, gd: 3, winner: 2}
    r32_r16: {exact: 8, gd: 5, winner: 3}
    qf_plus: {exact: 11, gd: 7, winner: 5}
knockout_scoring: 90min   # only '90min' supported in v1
odds:
  sport_key: soccer_fifa_world_cup   # verify in Task 14 against /v4/sports
  regions: [uk, eu]                  # us too would double extras cost; free tier = 500/mo
  cache_max_age_hours: 12
  extra_markets_window_hours: 24     # fetch btts/alt-totals only this close to kickoff
elo:
  disagreement_threshold: 0.15
display:
  upcoming_window_hours: 24   # default filter: Today (2/4 days selectable in app)
